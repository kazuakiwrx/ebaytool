<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セラーリサーチ・トラッカー</title>
<style>
  :root{ --skip:#fde68a; --ok:#d1fae5; --line:#e5e7eb; --muted:#6b7280; }
  *{ box-sizing:border-box; }
  body{ font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif; margin:0; padding:16px; color:#111827; background:#fff; }
  h1{ font-size:18px; margin:0 0 4px; }
  p.desc{ color:var(--muted); font-size:13px; margin:0 0 12px; }
  .bar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  button,select{ font-size:13px; padding:6px 10px; border:1px solid var(--line); border-radius:8px; background:#f9fafb; cursor:pointer; }
  button.primary{ background:#111827; color:#fff; border-color:#111827; }
  button.danger{ background:#fee2e2; border-color:#fecaca; color:#991b1b; }
  .stats{ font-size:13px; color:var(--muted); margin-left:auto; }
  table{ border-collapse:collapse; width:100%; font-size:12.5px; }
  th,td{ border:1px solid var(--line); padding:6px 8px; text-align:left; vertical-align:top; }
  th{ background:#f3f4f6; position:sticky; top:0; }
  tr.skip{ background:var(--skip); }
  .pill{ display:inline-block; padding:1px 8px; border-radius:999px; font-size:11px; border:1px solid var(--line); }
  .pill.skip{ background:#f59e0b; color:#fff; border-color:#f59e0b; }
  .pill.ready{ background:#10b981; color:#fff; border-color:#10b981; }
  .reason{ max-width:420px; color:#374151; }
  code{ background:#f3f4f6; padding:1px 5px; border-radius:5px; }
  .empty{ padding:32px; text-align:center; color:var(--muted); }
</style>
</head>
<body>
  <h1>セラーリサーチ・トラッカー <span style="font-size:12px;color:var(--muted);">(yui_chan_store)</span></h1>
  <p class="desc">
    yuichanstore-seller-research で「リサーチしたが出品できなかった」商品を記録し、
    <b id="skipDaysLabel">7</b>日以内は再リサーチをスキップするための一覧。
    データはこのブラウザの localStorage キー <code>seller_research_tracker</code> に保存されます。
  </p>

  <div class="bar">
    <button class="primary" onclick="render()">再読み込み</button>
    並び替え:
    <select id="sortSel" onchange="render()">
      <option value="recent">最終チェック（新しい順）</option>
      <option value="old">最終チェック（古い順）</option>
      <option value="tries">試行回数（多い順）</option>
      <option value="seller">セラー別</option>
    </select>
    <button onclick="purgeExpired()">スキップ期限切れ(7日超)を削除</button>
    <button class="danger" onclick="clearAll()">全消去</button>
    <span class="stats" id="stats"></span>
  </div>

  <div id="tableWrap"></div>

<script>
  var STORE_KEY = "seller_research_tracker";
  var SKIP_DAYS = 7;
  document.getElementById("skipDaysLabel").textContent = SKIP_DAYS;

  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) return { items:{} };
      var o = JSON.parse(raw);
      if(!o || typeof o!=="object" || !o.items) return { items:{} };
      return o;
    }catch(e){ return { items:{} }; }
  }
  function save(o){ localStorage.setItem(STORE_KEY, JSON.stringify(o)); }

  function daysSince(iso){
    if(!iso) return Infinity;
    var t = Date.parse(iso);
    if(isNaN(t)) return Infinity;
    return (Date.now() - t) / 86400000;
  }
  function fmt(iso){
    if(!iso) return "";
    var d = new Date(iso);
    if(isNaN(d)) return iso;
    var p = function(n){ return (n<10?"0":"")+n; };
    return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes());
  }

  function rows(){
    var o = load();
    var arr = Object.keys(o.items).map(function(k){ return o.items[k]; });
    var s = document.getElementById("sortSel").value;
    arr.sort(function(a,b){
      if(s==="recent") return (Date.parse(b.lastChecked)||0)-(Date.parse(a.lastChecked)||0);
      if(s==="old")    return (Date.parse(a.lastChecked)||0)-(Date.parse(b.lastChecked)||0);
      if(s==="tries")  return (b.tries||0)-(a.tries||0);
      if(s==="seller") return String(a.seller||"").localeCompare(String(b.seller||""));
      return 0;
    });
    return arr;
  }

  function render(){
    var arr = rows();
    var wrap = document.getElementById("tableWrap");
    var skipCount = 0, readyCount = 0;
    arr.forEach(function(r){ if(daysSince(r.lastChecked) < SKIP_DAYS) skipCount++; else readyCount++; });
    document.getElementById("stats").textContent =
      "全 "+arr.length+" 件 ／ スキップ中 "+skipCount+" ／ 再リサーチ可 "+readyCount;

    if(arr.length===0){ wrap.innerHTML = '<div class="empty">記録はまだありません。</div>'; return; }

    var html = '<table><thead><tr>'+
      '<th>状態</th><th>item ID</th><th>セラー</th><th>タイトル</th>'+
      '<th>最終チェック</th><th>試行</th><th>理由</th><th></th></tr></thead><tbody>';
    arr.forEach(function(r){
      var isSkip = daysSince(r.lastChecked) < SKIP_DAYS;
      html += '<tr class="'+(isSkip?"skip":"")+'">'+
        '<td>'+(isSkip
          ? '<span class="pill skip">スキップ中</span>'
          : '<span class="pill ready">再リサーチ可</span>')+'</td>'+
        '<td><code>'+esc(r.itemId)+'</code></td>'+
        '<td>'+esc(r.seller||"")+'</td>'+
        '<td>'+esc(r.title||"")+'</td>'+
        '<td>'+fmt(r.lastChecked)+'</td>'+
        '<td style="text-align:center">'+(r.tries||1)+'</td>'+
        '<td class="reason">'+esc(r.reason||"")+'</td>'+
        '<td><button class="danger" onclick="del(\''+esc(r.itemId)+'\')">削除</button></td>'+
        '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  function del(id){
    var o = load();
    if(o.items[id]){ delete o.items[id]; save(o); render(); }
  }
  function purgeExpired(){
    var o = load(), n=0;
    Object.keys(o.items).forEach(function(k){
      if(daysSince(o.items[k].lastChecked) >= SKIP_DAYS){ delete o.items[k]; n++; }
    });
    save(o); render();
    alert(n+" 件の期限切れ記録を削除しました。");
  }
  function clearAll(){
    if(!confirm("すべての記録を削除します。よろしいですか？")) return;
    save({ items:{} }); render();
  }

  render();
</script>
</body>
</html>
